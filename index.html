<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Capitainerie" />
  <title>Capitainerie — Community CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0E0E10;
      --bg2: #16161A;
      --bg3: #1E1E24;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #F0EFE9;
      --text2: #8A8994;
      --accent: #C8A96E;
      --accent2: #E8C98A;
      --green: #1D9E75;
      --blue: #378ADD;
      --red: #D85A30;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    /* HEADER */
    .header { padding: 16px 20px 12px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--bg); }
    .header-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.02em; color: var(--accent); }
    .header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .header-stats { text-align: right; }
    .header-stat-val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 600; color: var(--text); }
    .header-stat-lbl { font-size: 10px; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; }

    /* CONTENT */
    .content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

    /* BOTTOM NAV */
    .nav { display: flex; background: var(--bg2); border-top: 0.5px solid var(--border); padding: 8px 4px; padding-bottom: max(8px, env(safe-area-inset-bottom)); flex-shrink: 0; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; border: none; background: transparent; color: var(--text2); cursor: pointer; border-radius: var(--radius-sm); transition: all 0.15s; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 20px; height: 20px; stroke-width: 1.5; }
    .nav-label { font-size: 10px; letter-spacing: 0.03em; }

    /* SECTIONS */
    .section { display: none; }
    .section.active { display: block; }

    /* COHORT */
    .cohort-block { margin-bottom: 20px; }
    .cohort-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 8px; cursor: pointer; }
    .cohort-title-row { display: flex; align-items: center; gap: 8px; }
    .cohort-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cohort-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.03em; }
    .cohort-count { font-size: 11px; color: var(--text2); padding: 2px 8px; background: var(--bg3); border-radius: 20px; }
    .cohort-date { font-size: 11px; color: var(--text2); }
    .cohort-collapsed .cohort-members { display: none; }

    /* MEMBER CARD */
    .member-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; active-scale: 0.98; }
    .member-card:active { transform: scale(0.99); border-color: var(--border2); }
    .member-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .av-m { background: #0C447C33; color: #6AABF0; border: 0.5px solid #378ADD44; }
    .av-f { background: #72243E33; color: #F08AAB; border: 0.5px solid #D4537E44; }
    .member-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; }
    .member-meta { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .pill { font-size: 10px; padding: 3px 8px; border-radius: 20px; margin-left: auto; flex-shrink: 0; letter-spacing: 0.02em; }
    .pill-new { background: #633806; color: #F8C07A; }
    .pill-called { background: #0C3A6E; color: #6AABF0; }
    .pill-active { background: #0A4030; color: #4DC9A0; }
    .trigger { font-size: 12px; color: var(--text2); line-height: 1.5; border-left: 2px solid var(--border2); padding-left: 10px; }
    .tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: #EEEDFE18; color: #A8A4F8; border: 0.5px solid #A8A4F822; }
    .tag-need { background: #1D9E7518; color: #4DC9A0; border: 0.5px solid #1D9E7522; }

    /* FORM */
    .form-section-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px; margin-top: 20px; }
    .form-section-title:first-child { margin-top: 0; }
    .field { margin-bottom: 12px; }
    .field-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.03em; }
    input, textarea, select { width: 100%; font-size: 14px; padding: 10px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 64px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.15s; }
    .btn:active { opacity: 0.8; }
    .btn-gold { background: var(--accent); color: #0E0E10; }
    .btn-outline { background: transparent; border: 0.5px solid var(--border2); color: var(--text); }
    .divider { height: 0.5px; background: var(--border); margin: 24px 0; }

    /* MATCH */
    .match-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
    .score-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .score-bar { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 2px; background: var(--green); }
    .score-pct { font-size: 11px; color: var(--text2); min-width: 28px; text-align: right; }

    /* CONNECTIONS */
    .conn-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
    .conn-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .badge-done { background: #0A4030; color: #4DC9A0; font-size: 10px; padding: 2px 8px; border-radius: 20px; }
    .badge-pending { background: #3A2A10; color: #F8C07A; font-size: 10px; padding: 2px 8px; border-radius: 20px; }

    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap input { padding-left: 36px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); }

    /* SHEET */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; align-items: flex-end; backdrop-filter: blur(2px); }
    .overlay.open { display: flex; }
    .sheet { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 16px; width: 100%; max-height: 85dvh; overflow-y: auto; border-top: 0.5px solid var(--border2); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
    .sheet-close { float: right; background: var(--bg3); border: none; color: var(--text2); width: 28px; height: 28px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: -4px; }

    /* DETAIL */
    .detail-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .detail-meta { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
    .detail-section { margin-bottom: 14px; }
    .detail-label { font-size: 10px; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
    .detail-val { font-size: 13px; line-height: 1.55; }

    /* EMPTY / LOADING */
    .empty { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }

    /* TOAST */
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0E0E10; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 200; white-space: nowrap; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">LA CAPITAINERIE</div>
      <div class="header-sub">Community CRM</div>
    </div>
    <div class="header-stats">
      <div class="header-stat-val" id="stat-total">—</div>
      <div class="header-stat-lbl">membres</div>
    </div>
  </div>

  <div class="content">
    <!-- MEMBRES -->
    <div id="tab-members" class="section active">
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </span>
        <input type="text" placeholder="Rechercher un membre..." oninput="filterMembers(this.value)" />
      </div>
      <div id="members-list"><div class="empty"><div class="empty-icon">⚓</div>Connexion à Firebase...</div></div>
    </div>

    <!-- AJOUTER -->
    <div id="tab-add" class="section">
      <div class="form-section-title">Nouveau membre</div>
      <div class="field"><div class="field-label">Cohorte</div><select id="f-cohort"></select></div>
      <div class="grid2">
        <div class="field"><div class="field-label">Prénom</div><input type="text" id="f-name" placeholder="Thomas" /></div>
        <div class="field"><div class="field-label">Âge</div><input type="number" id="f-age" placeholder="34" /></div>
      </div>
      <div class="grid2">
        <div class="field"><div class="field-label">Genre</div><select id="f-gender"><option value="m">Homme</option><option value="f">Femme</option></select></div>
        <div class="field"><div class="field-label">Ville</div><input type="text" id="f-city" placeholder="Lyon" /></div>
      </div>
      <div class="field"><div class="field-label">Situation</div><input type="text" id="f-status" placeholder="Entrepreneur, salarié, en transition..." /></div>
      <div class="field"><div class="field-label">Déclencheur d'entrée</div><textarea id="f-trigger" placeholder="La vraie raison, en une phrase..."></textarea></div>
      <div class="field"><div class="field-label">Ce qu'il/elle apporte</div><input type="text" id="f-brings" placeholder="Réseau, compétences, énergie..." /></div>
      <div class="field"><div class="field-label">Ce qu'il/elle cherche</div><input type="text" id="f-needs" placeholder="Clarté, réseau, passage à l'action..." /></div>
      <div class="field"><div class="field-label">3 mots</div><input type="text" id="f-words" placeholder="Ambitieux, structuré, intuitif" /></div>
      <button class="btn btn-gold" onclick="addMember()">Ajouter le membre</button>

      <div class="divider"></div>

      <div class="form-section-title">Nouvelle cohorte</div>
      <div class="grid2">
        <div class="field"><div class="field-label">Nom</div><input type="text" id="nc-name" placeholder="Cohorte 1" /></div>
        <div class="field"><div class="field-label">Date</div><input type="date" id="nc-date" /></div>
      </div>
      <button class="btn btn-outline" onclick="addCohort()">Créer la cohorte</button>
    </div>

    <!-- MATCHING -->
    <div id="tab-matching" class="section">
      <div class="field"><div class="field-label">Membre</div><select id="match-select" onchange="runMatching()"><option value="">— Choisir —</option></select></div>
      <div class="field"><div class="field-label">Périmètre</div>
        <select id="match-scope" onchange="runMatching()">
          <option value="all">Tous les membres</option>
          <option value="cohort">Même cohorte</option>
        </select>
      </div>
      <div id="match-results"></div>
    </div>

    <!-- LIENS -->
    <div id="tab-connections" class="section">
      <div id="connections-list"><div class="empty"><div class="empty-icon">🔗</div>Aucune mise en relation</div></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('members')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="nav-label">Membres</span>
    </button>
    <button class="nav-btn" onclick="switchTab('add')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      <span class="nav-label">Ajouter</span>
    </button>
    <button class="nav-btn" onclick="switchTab('matching')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <span class="nav-label">Matching</span>
    </button>
    <button class="nav-btn" onclick="switchTab('connections')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="nav-label">Liens</span>
    </button>
  </nav>
</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="detail-overlay" onclick="closeOverlay(event, 'detail-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="document.getElementById('detail-overlay').classList.remove('open')">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyALztD7QZAvUAKJ8I4lxqzcYKtcw5H-P00",
  authDomain: "capitainerie-5498e.firebaseapp.com",
  projectId: "capitainerie-5498e",
  storageBucket: "capitainerie-5498e.firebasestorage.app",
  messagingSenderId: "532000161107",
  appId: "1:532000161107:web:7692a47352602aca58f5a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const COLORS = ["#C8A96E","#1D9E75","#378ADD","#D85A30","#D4537E","#7F77DD","#639922"];
const OB_LABELS = { new: "Nouveau", called: "Note envoyée", active: "Actif" };
const OB_CLASS = { new: "pill-new", called: "pill-called", active: "pill-active" };

let cohorts = [], members = [], connections = [];

window.showToast = function(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
};

function cohortColor(id) {
  const i = cohorts.findIndex(c => c.id === id);
  return COLORS[i % COLORS.length];
}
function inits(n) { return (n||"??").slice(0,2).toUpperCase(); }
function avClass(g) { return g === "f" ? "av-f" : "av-m"; }
function fmtDate(d) { if (!d) return ""; return new Date(d).toLocaleDateString("fr-FR", { month:"short", year:"numeric" }); }

// Realtime listeners
onSnapshot(query(collection(db,"cohorts"), orderBy("createdAt")), snap => {
  cohorts = snap.docs.map(d => ({id:d.id,...d.data()}));
  updateCohortSelect(); updateMatchSelect(); renderMembers();
  document.getElementById("stat-total").textContent = members.length;
});
onSnapshot(query(collection(db,"members"), orderBy("createdAt")), snap => {
  members = snap.docs.map(d => ({id:d.id,...d.data()}));
  updateMatchSelect(); renderMembers();
  document.getElementById("stat-total").textContent = members.length;
});
onSnapshot(query(collection(db,"connections"), orderBy("createdAt")), snap => {
  connections = snap.docs.map(d => ({id:d.id,...d.data()}));
  renderConnections();
});

function renderMembers(list) {
  const el = document.getElementById("members-list");
  const src = list || members;
  if (!cohorts.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">⚓</div>Créez votre première cohorte<br>dans l'onglet Ajouter</div>`; return; }
  const grouped = {};
  cohorts.forEach(c => grouped[c.id] = []);
  src.forEach(m => { if (grouped[m.cohortId] !== undefined) grouped[m.cohortId].push(m); });
  let html = "";
  cohorts.forEach(c => {
    const ms = grouped[c.id]||[];
    const col = cohortColor(c.id);
    html += `<div class="cohort-block" id="cb-${c.id}">
      <div class="cohort-header" onclick="toggleCohort('${c.id}')">
        <div class="cohort-title-row">
          <div class="cohort-dot" style="background:${col}"></div>
          <span class="cohort-name">${c.name}</span>
          <span class="cohort-count">${ms.length}</span>
        </div>
        <span class="cohort-date">${fmtDate(c.date)}</span>
      </div>
      <div class="cohort-members">
        ${!ms.length ? `<div class="empty" style="padding:16px">Aucun membre</div>` : ms.map(m => `
        <div class="member-card" onclick="openDetail('${m.id}')">
          <div class="member-card-top">
            <div class="avatar ${avClass(m.gender)}">${inits(m.name)}</div>
            <div style="flex:1">
              <div class="member-name">${m.name}</div>
              <div class="member-meta">${m.age} ans · ${m.city}</div>
            </div>
            <span class="pill ${OB_CLASS[m.onboarding]||'pill-new'}">${OB_LABELS[m.onboarding]||'Nouveau'}</span>
          </div>
          <div class="trigger">${m.trigger||'—'}</div>
          <div class="tags">${(m.words||'').split(',').map(w=>`<span class="tag">${w.trim()}</span>`).join('')}</div>
        </div>`).join('')}
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

window.toggleCohort = id => document.getElementById("cb-"+id)?.classList.toggle("cohort-collapsed");

window.filterMembers = q => {
  if (!q) { renderMembers(members); return; }
  renderMembers(members.filter(m =>
    (m.name||"").toLowerCase().includes(q.toLowerCase()) ||
    (m.city||"").toLowerCase().includes(q.toLowerCase()) ||
    (m.status||"").toLowerCase().includes(q.toLowerCase())
  ));
};

window.openDetail = id => {
  const m = members.find(x=>x.id===id);
  if (!m) return;
  const c = cohorts.find(x=>x.id===m.cohortId);
  const col = cohortColor(m.cohortId);
  const connNames = connections
    .filter(cn=>cn.member1===id||cn.member2===id)
    .map(cn=>members.find(x=>x.id===(cn.member1===id?cn.member2:cn.member1))?.name)
    .filter(Boolean);
  document.getElementById("detail-content").innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="avatar ${avClass(m.gender)}" style="width:48px;height:48px;font-size:14px">${inits(m.name)}</div>
      <div style="flex:1">
        <div class="detail-name">${m.name}</div>
        <div class="detail-meta">${m.age} ans · ${m.city} · <span style="color:${col}">${c?.name||''}</span></div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Statut onboarding</div>
      <select onchange="updateOB('${m.id}',this.value)" style="margin-top:4px">
        <option value="new" ${m.onboarding==='new'?'selected':''}>Nouveau</option>
        <option value="called" ${m.onboarding==='called'?'selected':''}>Note envoyée</option>
        <option value="active" ${m.onboarding==='active'?'selected':''}>Actif</option>
      </select>
    </div>
    <div class="detail-section"><div class="detail-label">Situation</div><div class="detail-val">${m.status||'—'}</div></div>
    <div class="detail-section"><div class="detail-label">Déclencheur</div><div class="trigger">${m.trigger||'—'}</div></div>
    <div class="detail-section"><div class="detail-label">Apporte</div><div class="detail-val">${m.brings||'—'}</div></div>
    <div class="detail-section"><div class="detail-label">Cherche</div><div class="detail-val">${m.needs||'—'}</div></div>
    <div class="detail-section">
      <div class="detail-label">Mots clés</div>
      <div class="tags" style="margin-top:4px">
        ${(m.words||'').split(',').map(w=>`<span class="tag">${w.trim()}</span>`).join('')}
        ${(m.needs||'').split(',').map(w=>`<span class="tag tag-need">${w.trim()}</span>`).join('')}
      </div>
    </div>
    ${connNames.length?`<div class="detail-section"><div class="detail-label">Connecté avec</div><div class="detail-val">${connNames.join(', ')}</div></div>`:''}
    <button class="btn btn-outline" style="margin-top:8px" onclick="document.getElementById('detail-overlay').classList.remove('open');switchTab('matching');document.getElementById('match-select').value='${id}';runMatching()">Voir les matchs →</button>
  `;
  document.getElementById("detail-overlay").classList.add("open");
};

window.closeOverlay = (e, id) => { if (e.target === document.getElementById(id)) document.getElementById(id).classList.remove("open"); };

window.updateOB = async (id, val) => {
  await updateDoc(doc(db,"members",id), {onboarding:val});
  showToast("Statut mis à jour ✓");
};

window.addMember = async () => {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("Prénom requis"); return; }
  const cohortId = document.getElementById("f-cohort").value;
  if (!cohortId) { alert("Sélectionne une cohorte"); return; }
  await addDoc(collection(db,"members"), {
    cohortId, name,
    age: parseInt(document.getElementById("f-age").value)||0,
    gender: document.getElementById("f-gender").value,
    city: document.getElementById("f-city").value.trim()||"N/A",
    status: document.getElementById("f-status").value.trim()||"N/A",
    trigger: document.getElementById("f-trigger").value.trim()||"—",
    brings: document.getElementById("f-brings").value.trim()||"—",
    needs: document.getElementById("f-needs").value.trim()||"—",
    words: document.getElementById("f-words").value.trim()||"—",
    onboarding: "new",
    createdAt: serverTimestamp()
  });
  ["f-name","f-age","f-city","f-status","f-trigger","f-brings","f-needs","f-words"].forEach(i=>document.getElementById(i).value="");
  showToast("Membre ajouté ✓");
  switchTab("members");
};

window.addCohort = async () => {
  const name = document.getElementById("nc-name").value.trim();
  if (!name) { alert("Nom requis"); return; }
  const date = document.getElementById("nc-date").value || new Date().toISOString().slice(0,10);
  await addDoc(collection(db,"cohorts"), {name, date, createdAt: serverTimestamp()});
  document.getElementById("nc-name").value = "";
  document.getElementById("nc-date").value = "";
  showToast("Cohorte créée ✓");
};

function updateCohortSelect() {
  const sel = document.getElementById("f-cohort");
  sel.innerHTML = cohorts.length
    ? cohorts.map(c=>`<option value="${c.id}">${c.name} — ${fmtDate(c.date)}</option>`).join("")
    : '<option value="">Créez d\'abord une cohorte</option>';
}

function updateMatchSelect() {
  const sel = document.getElementById("match-select");
  const val = sel.value;
  sel.innerHTML = '<option value="">— Choisir —</option>' + cohorts.map(c => {
    const ms = members.filter(m=>m.cohortId===c.id);
    if (!ms.length) return "";
    return `<optgroup label="${c.name}">${ms.map(m=>`<option value="${m.id}">${m.name} · ${m.city}</option>`).join("")}</optgroup>`;
  }).join("");
  if (val) sel.value = val;
}

function scoreMatch(a,b) {
  let s = 0;
  const kws = ["leadership","réseau","digital","structure","discipline","clarté","sens","vision","créativ","mental","action","transform","management","énergie","coaching","finance","immobilier","entrepreneuri"];
  kws.forEach(k => {
    if ((a.brings||"").toLowerCase().includes(k) && (b.needs||"").toLowerCase().includes(k)) s += 20;
    if ((b.brings||"").toLowerCase().includes(k) && (a.needs||"").toLowerCase().includes(k)) s += 20;
  });
  if (Math.abs((a.age||0)-(b.age||0)) < 10) s += 10;
  if (a.city !== b.city) s += 5;
  return Math.min(s, 99);
}

window.runMatching = () => {
  const id = document.getElementById("match-select").value;
  const scope = document.getElementById("match-scope").value;
  const el = document.getElementById("match-results");
  if (!id) { el.innerHTML=""; return; }
  const base = members.find(m=>m.id===id);
  if (!base) return;
  const already = connections.filter(c=>c.member1===id||c.member2===id).map(c=>c.member1===id?c.member2:c.member1);
  let pool = members.filter(m=>m.id!==id);
  if (scope==="cohort") pool = pool.filter(m=>m.cohortId===base.cohortId);
  const cands = pool.map(m=>({...m,score:scoreMatch(base,m)})).sort((a,b)=>b.score-a.score);
  if (!cands.length) { el.innerHTML='<div class="empty">Aucun candidat</div>'; return; }
  el.innerHTML = `<div style="font-size:11px;color:var(--text2);margin-bottom:10px;letter-spacing:0.03em">MATCHS POUR ${base.name.toUpperCase()}</div>` + cands.map(m => {
    const c = cohorts.find(x=>x.id===m.cohortId);
    const col = cohortColor(m.cohortId);
    const done = already.includes(m.id);
    return `<div class="match-card">
      <div class="member-card-top">
        <div class="avatar ${avClass(m.gender)}">${inits(m.name)}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="member-name">${m.name}</span>
            <span style="font-size:10px;padding:2px 6px;border-radius:20px;background:${col}22;color:${col}">${c?.name||""}</span>
          </div>
          <div class="score-row"><div class="score-bar"><div class="score-fill" style="width:${m.score}%"></div></div><div class="score-pct">${m.score}%</div></div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">${m.brings||'—'}</div>
      ${done ? '<span class="badge-done">Déjà connectés</span>' : `<button class="btn btn-outline" style="padding:8px" onclick="addConn('${id}','${m.id}','${base.name}','${m.name}')">Connecter ${base.name} & ${m.name}</button>`}
    </div>`;
  }).join("");
};

window.addConn = async (id1,id2,n1,n2) => {
  await addDoc(collection(db,"connections"), {
    member1:id1, member2:id2,
    reason: `Matching — ${new Date().toLocaleDateString("fr-FR")}`,
    status:"pending", createdAt: serverTimestamp()
  });
  showToast(`${n1} & ${n2} connectés ✓`);
  runMatching();
};

function renderConnections() {
  const el = document.getElementById("connections-list");
  if (!connections.length) { el.innerHTML='<div class="empty"><div class="empty-icon">🔗</div>Aucune mise en relation</div>'; return; }
  el.innerHTML = connections.map(c => {
    const m1=members.find(m=>m.id===c.member1), m2=members.find(m=>m.id===c.member2);
    if (!m1||!m2) return "";
    return `<div class="conn-card">
      <div class="conn-header">
        <div class="avatar ${avClass(m1.gender)}" style="width:30px;height:30px;font-size:10px">${inits(m1.name)}</div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        <div class="avatar ${avClass(m2.gender)}" style="width:30px;height:30px;font-size:10px">${inits(m2.name)}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500">${m1.name} & ${m2.name}</div>
          <div style="font-size:11px;color:var(--text2)">${c.reason||''}</div>
        </div>
        <span class="${c.status==='done'?'badge-done':'badge-pending'}">${c.status==='done'?'Fait':'En attente'}</span>
      </div>
      ${c.status==='pending'?`<button class="btn btn-outline" style="padding:8px;font-size:12px" onclick="markDone('${c.id}')">Marquer comme fait</button>`:''}
    </div>`;
  }).join("");
}

window.markDone = async id => {
  await updateDoc(doc(db,"connections",id), {status:"done"});
  showToast("Validé ✓");
};

window.switchTab = name => {
  const tabs = ["members","add","matching","connections"];
  document.querySelectorAll(".nav-btn").forEach((b,i)=>b.classList.toggle("active",tabs[i]===name));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("tab-"+name).classList.add("active");
  if (name==="matching") updateMatchSelect();
  if (name==="connections") renderConnections();
};
</script>
</body>
</html>
