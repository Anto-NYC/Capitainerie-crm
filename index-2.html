<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Capitainerie" />
  <title>Capitainerie — Community CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0E0E10; --bg2: #16161A; --bg3: #1E1E24;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
      --text: #F0EFE9; --text2: #8A8994;
      --accent: #C8A96E; --green: #1D9E75; --blue: #378ADD;
      --radius: 12px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
    .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    .header { padding: 16px 20px 12px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .header-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); }
    .header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .header-stat-val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 600; text-align: right; }
    .header-stat-lbl { font-size: 10px; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; text-align: right; }
    .content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
    .nav { display: flex; background: var(--bg2); border-top: 0.5px solid var(--border); padding: 8px 4px; padding-bottom: max(8px, env(safe-area-inset-bottom)); flex-shrink: 0; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; border: none; background: transparent; color: var(--text2); cursor: pointer; border-radius: var(--radius-sm); transition: all 0.15s; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 20px; height: 20px; stroke-width: 1.5; }
    .nav-label { font-size: 10px; }
    .section { display: none; }
    .section.active { display: block; }
    .cohort-block { margin-bottom: 20px; }
    .cohort-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 8px; cursor: pointer; }
    .cohort-title-row { display: flex; align-items: center; gap: 8px; }
    .cohort-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cohort-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; }
    .cohort-count { font-size: 11px; color: var(--text2); padding: 2px 8px; background: var(--bg3); border-radius: 20px; }
    .cohort-collapsed .cohort-members { display: none; }
    .member-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
    .member-card:active { border-color: var(--border2); }
    .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .av-m { background: #0C447C33; color: #6AABF0; border: 0.5px solid #378ADD44; }
    .av-f { background: #72243E33; color: #F08AAB; border: 0.5px solid #D4537E44; }
    .member-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; }
    .member-meta { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .pill { font-size: 10px; padding: 3px 8px; border-radius: 20px; margin-left: auto; flex-shrink: 0; }
    .pill-new { background: #633806; color: #F8C07A; }
    .pill-called { background: #0C3A6E; color: #6AABF0; }
    .pill-active { background: #0A4030; color: #4DC9A0; }
    .trigger { font-size: 12px; color: var(--text2); line-height: 1.5; border-left: 2px solid var(--border2); padding-left: 10px; }
    .tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: #EEEDFE18; color: #A8A4F8; border: 0.5px solid #A8A4F822; }
    .tag-need { background: #1D9E7518; color: #4DC9A0; border: 0.5px solid #1D9E7522; }
    .form-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px; margin-top: 20px; }
    .form-title:first-child { margin-top: 0; }
    .field { margin-bottom: 12px; }
    .field-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; }
    input, textarea, select { width: 100%; font-size: 14px; padding: 10px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; -webkit-appearance: none; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 64px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; }
    .btn:active { opacity: 0.8; }
    .btn-gold { background: var(--accent); color: #0E0E10; }
    .btn-outline { background: transparent; border: 0.5px solid var(--border2); color: var(--text); }
    .btn-ai { background: linear-gradient(135deg, #1a7a5a, #2a6aad); color: white; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
    .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider { height: 0.5px; background: var(--border); margin: 24px 0; }
    .match-card { background: var(--bg2); border: 0.5px solid #1D9E7533; border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
    .score-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .score-bar { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #1D9E75, #378ADD); transition: width 1s ease; }
    .score-pct { font-size: 11px; color: var(--text2); min-width: 28px; text-align: right; }
    .ai-reasoning { font-size: 12px; color: var(--text2); line-height: 1.55; margin: 8px 0; padding: 8px 10px; background: var(--bg3); border-radius: var(--radius-sm); border-left: 2px solid var(--green); }
    .ai-badge { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: #1D9E7522; color: #4DC9A0; border: 0.5px solid #1D9E7544; }
    .conn-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; }
    .badge-done { background: #0A4030; color: #4DC9A0; font-size: 10px; padding: 2px 8px; border-radius: 20px; }
    .badge-pending { background: #3A2A10; color: #F8C07A; font-size: 10px; padding: 2px 8px; border-radius: 20px; }
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap input { padding-left: 36px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; align-items: flex-end; backdrop-filter: blur(2px); }
    .overlay.open { display: flex; }
    .sheet { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 16px; width: 100%; max-height: 85dvh; overflow-y: auto; border-top: 0.5px solid var(--border2); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
    .sheet-close { float: right; background: var(--bg3); border: none; color: var(--text2); width: 28px; height: 28px; border-radius: 50%; font-size: 14px; cursor: pointer; }
    .detail-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .detail-section { margin-bottom: 14px; }
    .detail-label { font-size: 10px; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
    .detail-val { font-size: 13px; line-height: 1.55; }
    .empty { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .loading-dots { display: inline-flex; gap: 4px; }
    .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1} }
    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0E0E10; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 200; white-space: nowrap; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">LA CAPITAINERIE</div>
      <div class="header-sub">Community CRM</div>
    </div>
    <div>
      <div class="header-stat-val" id="stat-total">—</div>
      <div class="header-stat-lbl">membres</div>
    </div>
  </div>

  <div class="content">
    <div id="tab-members" class="section active">
      <div class="search-wrap">
        <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input type="text" placeholder="Rechercher un membre..." oninput="filterMembers(this.value)" />
      </div>
      <div id="members-list"><div class="empty"><div class="empty-icon">⚓</div>Connexion...</div></div>
    </div>

    <div id="tab-add" class="section">
      <div class="form-title">Nouveau membre</div>
      <div class="field"><div class="field-label">Cohorte</div><select id="f-cohort"></select></div>
      <div class="grid2">
        <div class="field"><div class="field-label">Prénom</div><input type="text" id="f-name" placeholder="Thomas" /></div>
        <div class="field"><div class="field-label">Âge</div><input type="number" id="f-age" placeholder="34" /></div>
      </div>
      <div class="grid2">
        <div class="field"><div class="field-label">Genre</div><select id="f-gender"><option value="m">Homme</option><option value="f">Femme</option></select></div>
        <div class="field"><div class="field-label">Ville</div><input type="text" id="f-city" placeholder="Lyon" /></div>
      </div>
      <div class="field"><div class="field-label">Situation</div><input type="text" id="f-status" placeholder="Entrepreneur, salarié, en transition..." /></div>
      <div class="field"><div class="field-label">Déclencheur d'entrée</div><textarea id="f-trigger" placeholder="La vraie raison, en une phrase..."></textarea></div>
      <div class="field"><div class="field-label">Ce qu'il/elle apporte</div><input type="text" id="f-brings" placeholder="Réseau, compétences, énergie..." /></div>
      <div class="field"><div class="field-label">Ce qu'il/elle cherche</div><input type="text" id="f-needs" placeholder="Clarté, réseau, passage à l'action..." /></div>
      <div class="field"><div class="field-label">3 mots</div><input type="text" id="f-words" placeholder="Ambitieux, structuré, intuitif" /></div>
      <button class="btn btn-gold" onclick="addMember()">Ajouter le membre</button>
      <div class="divider"></div>
      <div class="form-title">Nouvelle cohorte</div>
      <div class="grid2">
        <div class="field"><div class="field-label">Nom</div><input type="text" id="nc-name" placeholder="Cohorte 1" /></div>
        <div class="field"><div class="field-label">Date</div><input type="date" id="nc-date" /></div>
      </div>
      <button class="btn btn-outline" onclick="addCohort()">Créer la cohorte</button>
    </div>

    <div id="tab-matching" class="section">
      <div class="field"><div class="field-label">Membre</div><select id="match-select" onchange="document.getElementById('match-results').innerHTML=''"><option value="">— Choisir —</option></select></div>
      <div class="field"><div class="field-label">Périmètre</div>
        <select id="match-scope" onchange="document.getElementById('match-results').innerHTML=''">
          <option value="all">Tous les membres</option>
          <option value="cohort">Même cohorte</option>
        </select>
      </div>
      <button class="btn btn-ai" id="btn-ai" onclick="runAIMatching()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Analyser avec l'IA
      </button>
      <div id="match-results"></div>
    </div>

    <div id="tab-connections" class="section">
      <div id="connections-list"><div class="empty"><div class="empty-icon">🔗</div>Aucune mise en relation</div></div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('members')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="nav-label">Membres</span>
    </button>
    <button class="nav-btn" onclick="switchTab('add')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      <span class="nav-label">Ajouter</span>
    </button>
    <button class="nav-btn" onclick="switchTab('matching')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <span class="nav-label">Matching</span>
    </button>
    <button class="nav-btn" onclick="switchTab('connections')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="nav-label">Liens</span>
    </button>
  </nav>
</div>

<div class="overlay" id="detail-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <button class="sheet-close" onclick="document.getElementById('detail-overlay').classList.remove('open')">✕</button>
    <div id="detail-content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey: "AIzaSyALztD7QZAvUAKJ8I4lxqzcYKtcw5H-P00",
  authDomain: "capitainerie-5498e.firebaseapp.com",
  projectId: "capitainerie-5498e",
  storageBucket: "capitainerie-5498e.firebasestorage.app",
  messagingSenderId: "532000161107",
  appId: "1:532000161107:web:7692a47352602aca58f5a6"
}));

const COLORS=["#C8A96E","#1D9E75","#378ADD","#D85A30","#D4537E","#7F77DD","#639922"];
const OB_LABELS={new:"Nouveau",called:"Note envoyée",active:"Actif"};
const OB_CLASS={new:"pill-new",called:"pill-called",active:"pill-active"};
let cohorts=[],members=[],connections=[];

const toast=msg=>{const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);};
const cc=id=>{const i=cohorts.findIndex(c=>c.id===id);return COLORS[i%COLORS.length];};
const ini=n=>(n||"??").slice(0,2).toUpperCase();
const avc=g=>g==="f"?"av-f":"av-m";
const fdt=d=>d?new Date(d).toLocaleDateString("fr-FR",{month:"short",year:"numeric"}):"";

onSnapshot(query(collection(db,"cohorts"),orderBy("createdAt")),s=>{cohorts=s.docs.map(d=>({id:d.id,...d.data()}));updCS();updMS();renderM();});
onSnapshot(query(collection(db,"members"),orderBy("createdAt")),s=>{members=s.docs.map(d=>({id:d.id,...d.data()}));updMS();renderM();document.getElementById("stat-total").textContent=members.length;});
onSnapshot(query(collection(db,"connections"),orderBy("createdAt")),s=>{connections=s.docs.map(d=>({id:d.id,...d.data()}));renderC();});

function renderM(list){
  const el=document.getElementById("members-list"),src=list||members;
  if(!cohorts.length){el.innerHTML='<div class="empty"><div class="empty-icon">⚓</div>Créez votre première cohorte dans Ajouter</div>';return;}
  const g={};cohorts.forEach(c=>g[c.id]=[]);src.forEach(m=>{if(g[m.cohortId]!==undefined)g[m.cohortId].push(m);});
  el.innerHTML=cohorts.map(c=>{
    const ms=g[c.id]||[],col=cc(c.id);
    return`<div class="cohort-block" id="cb-${c.id}">
      <div class="cohort-header" onclick="toggleC('${c.id}')">
        <div class="cohort-title-row"><div class="cohort-dot" style="background:${col}"></div><span class="cohort-name">${c.name}</span><span class="cohort-count">${ms.length}</span></div>
        <span style="font-size:11px;color:var(--text2)">${fdt(c.date)}</span>
      </div>
      <div class="cohort-members">${!ms.length?'<div class="empty" style="padding:16px">Aucun membre</div>':ms.map(m=>`
        <div class="member-card" onclick="openD('${m.id}')">
          <div class="card-top">
            <div class="avatar ${avc(m.gender)}">${ini(m.name)}</div>
            <div style="flex:1"><div class="member-name">${m.name}</div><div class="member-meta">${m.age} ans · ${m.city}</div></div>
            <span class="pill ${OB_CLASS[m.onboarding]||'pill-new'}">${OB_LABELS[m.onboarding]||'Nouveau'}</span>
          </div>
          <div class="trigger">${m.trigger||'—'}</div>
          <div class="tags">${(m.words||'').split(',').map(w=>`<span class="tag">${w.trim()}</span>`).join('')}</div>
        </div>`).join('')}</div></div>`;
  }).join('');
}

window.toggleC=id=>document.getElementById("cb-"+id)?.classList.toggle("cohort-collapsed");
window.filterMembers=q=>{if(!q){renderM(members);return;}renderM(members.filter(m=>[m.name,m.city,m.status].some(v=>(v||"").toLowerCase().includes(q.toLowerCase()))));};

window.openD=id=>{
  const m=members.find(x=>x.id===id);if(!m)return;
  const c=cohorts.find(x=>x.id===m.cohortId),col=cc(m.cohortId);
  const cn=connections.filter(x=>x.member1===id||x.member2===id).map(x=>members.find(y=>y.id===(x.member1===id?x.member2:x.member1))?.name).filter(Boolean);
  document.getElementById("detail-content").innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="avatar ${avc(m.gender)}" style="width:48px;height:48px;font-size:14px">${ini(m.name)}</div>
      <div style="flex:1"><div class="detail-name">${m.name}</div><div style="font-size:12px;color:var(--text2)">${m.age} ans · ${m.city} · <span style="color:${col}">${c?.name||''}</span></div></div>
    </div>
    <div class="detail-section"><div class="detail-label">Statut onboarding</div>
      <select onchange="updOB('${m.id}',this.value)" style="margin-top:4px">
        <option value="new" ${m.onboarding==='new'?'selected':''}>Nouveau</option>
        <option value="called" ${m.onboarding==='called'?'selected':''}>Note envoyée</option>
        <option value="active" ${m.onboarding==='active'?'selected':''}>Actif</option>
      </select></div>
    <div class="detail-section"><div class="detail-label">Situation</div><div class="detail-val">${m.status||'—'}</div></div>
    <div class="detail-section"><div class="detail-label">Déclencheur</div><div class="trigger">${m.trigger||'—'}</div></div>
    <div class="detail-section"><div class="detail-label">Apporte</div><div class="detail-val">${m.brings||'—'}</div></div>
    <div class="detail-section"><div class="detail-label">Cherche</div><div class="detail-val">${m.needs||'—'}</div></div>
    <div class="detail-section"><div class="detail-label">Mots clés</div>
      <div class="tags" style="margin-top:4px">${(m.words||'').split(',').map(w=>`<span class="tag">${w.trim()}</span>`).join('')}${(m.needs||'').split(',').map(w=>`<span class="tag tag-need">${w.trim()}</span>`).join('')}</div></div>
    ${cn.length?`<div class="detail-section"><div class="detail-label">Connecté avec</div><div class="detail-val">${cn.join(', ')}</div></div>`:''}
    <button class="btn btn-outline" style="margin-top:8px" onclick="document.getElementById('detail-overlay').classList.remove('open');switchTab('matching');document.getElementById('match-select').value='${id}'">Voir les matchs →</button>`;
  document.getElementById("detail-overlay").classList.add("open");
};

window.updOB=async(id,val)=>{await updateDoc(doc(db,"members",id),{onboarding:val});toast("Statut mis à jour ✓");};

window.addMember=async()=>{
  const name=document.getElementById("f-name").value.trim();
  if(!name){alert("Prénom requis");return;}
  const cohortId=document.getElementById("f-cohort").value;
  if(!cohortId){alert("Sélectionne une cohorte");return;}
  await addDoc(collection(db,"members"),{cohortId,name,age:parseInt(document.getElementById("f-age").value)||0,gender:document.getElementById("f-gender").value,city:document.getElementById("f-city").value.trim()||"N/A",status:document.getElementById("f-status").value.trim()||"N/A",trigger:document.getElementById("f-trigger").value.trim()||"—",brings:document.getElementById("f-brings").value.trim()||"—",needs:document.getElementById("f-needs").value.trim()||"—",words:document.getElementById("f-words").value.trim()||"—",onboarding:"new",createdAt:serverTimestamp()});
  ["f-name","f-age","f-city","f-status","f-trigger","f-brings","f-needs","f-words"].forEach(i=>document.getElementById(i).value="");
  toast("Membre ajouté ✓");switchTab("members");
};

window.addCohort=async()=>{
  const name=document.getElementById("nc-name").value.trim();
  if(!name){alert("Nom requis");return;}
  await addDoc(collection(db,"cohorts"),{name,date:document.getElementById("nc-date").value||new Date().toISOString().slice(0,10),createdAt:serverTimestamp()});
  document.getElementById("nc-name").value="";document.getElementById("nc-date").value="";
  toast("Cohorte créée ✓");
};

function updCS(){const s=document.getElementById("f-cohort");s.innerHTML=cohorts.length?cohorts.map(c=>`<option value="${c.id}">${c.name} — ${fdt(c.date)}</option>`).join(""):'<option value="">Créez d\'abord une cohorte</option>';}
function updMS(){const s=document.getElementById("match-select"),v=s.value;s.innerHTML='<option value="">— Choisir —</option>'+cohorts.map(c=>{const ms=members.filter(m=>m.cohortId===c.id);return ms.length?`<optgroup label="${c.name}">${ms.map(m=>`<option value="${m.id}">${m.name} · ${m.city}</option>`).join("")}</optgroup>`:""}).join("");if(v)s.value=v;}

// ── MATCHING IA — appel via /api/match (sécurisé, clé côté serveur) ──
window.runAIMatching=async()=>{
  const id=document.getElementById("match-select").value;
  const scope=document.getElementById("match-scope").value;
  const el=document.getElementById("match-results");
  const btn=document.getElementById("btn-ai");
  if(!id){el.innerHTML='<div class="empty">Sélectionne un membre</div>';return;}
  const base=members.find(m=>m.id===id);if(!base)return;
  let pool=members.filter(m=>m.id!==id);
  if(scope==="cohort")pool=pool.filter(m=>m.cohortId===base.cohortId);
  if(!pool.length){el.innerHTML='<div class="empty">Aucun candidat</div>';return;}
  const already=connections.filter(c=>c.member1===id||c.member2===id).map(c=>c.member1===id?c.member2:c.member1);

  btn.disabled=true;
  el.innerHTML=`<div class="empty"><div class="loading-dots"><span></span><span></span><span></span></div><div style="margin-top:12px;font-size:12px">Claude analyse les profils...</div></div>`;

  const pf=m=>`${m.name} (${m.age}a, ${m.city}) | Situation: ${m.status} | Apporte: ${m.brings} | Cherche: ${m.needs} | Mots: ${m.words} | Déclencheur: ${m.trigger}`;

  const prompt=`Tu es expert en mise en relation au sein de "La Capitainerie", communauté de développement personnel et entrepreneurial.

Profil de référence:
${pf(base)}

Candidats à évaluer:
${pool.map((m,i)=>`[${i}] ${pf(m)}`).join('\n')}

Évalue la compatibilité en tenant compte de : la complémentarité apports/besoins (dans les deux sens), la résonance des déclencheurs d'entrée, la compatibilité des personnalités, et le potentiel de valeur mutuelle.

Réponds UNIQUEMENT en JSON valide sans markdown:
{"matches":[{"index":0,"score":85,"reasoning":"1-2 phrases en français expliquant pourquoi ce match est pertinent"}]}

Trie par score décroissant. Scores entre 0 et 100.`;

  try{
    const res=await fetch("/api/match",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
    const data=await res.json();
    const parsed=JSON.parse((data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
    const matches=parsed.matches||[];
    if(!matches.length){el.innerHTML='<div class="empty">Aucun match trouvé</div>';btn.disabled=false;return;}
    el.innerHTML=`<div style="font-size:11px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px"><span>MATCHS POUR ${base.name.toUpperCase()}</span><span class="ai-badge">✦ IA</span></div>`+matches.map(match=>{
      const m=pool[match.index];if(!m)return"";
      const c=cohorts.find(x=>x.id===m.cohortId),col=cc(m.cohortId),done=already.includes(m.id);
      return`<div class="match-card">
        <div class="card-top">
          <div class="avatar ${avc(m.gender)}">${ini(m.name)}</div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:6px"><span class="member-name">${m.name}</span><span style="font-size:10px;padding:2px 6px;border-radius:20px;background:${col}22;color:${col}">${c?.name||""}</span></div>
            <div class="score-row"><div class="score-bar"><div class="score-fill" style="width:${match.score}%"></div></div><div class="score-pct">${match.score}%</div></div>
          </div>
        </div>
        <div class="ai-reasoning">${match.reasoning}</div>
        ${done?'<span class="badge-done">Déjà connectés</span>':`<button class="btn btn-outline" style="padding:8px;font-size:12px" onclick="addConn('${id}','${m.id}','${base.name}','${m.name}')">Connecter ${base.name} & ${m.name}</button>`}
      </div>`;
    }).join("");
  }catch(e){el.innerHTML=`<div class="empty">Erreur IA : ${e.message}</div>`;}
  btn.disabled=false;
};

window.addConn=async(id1,id2,n1,n2)=>{
  await addDoc(collection(db,"connections"),{member1:id1,member2:id2,reason:`Matching IA — ${new Date().toLocaleDateString("fr-FR")}`,status:"pending",createdAt:serverTimestamp()});
  toast(`${n1} & ${n2} connectés ✓`);runAIMatching();
};

function renderC(){
  const el=document.getElementById("connections-list");
  if(!connections.length){el.innerHTML='<div class="empty"><div class="empty-icon">🔗</div>Aucune mise en relation</div>';return;}
  el.innerHTML=connections.map(c=>{
    const m1=members.find(m=>m.id===c.member1),m2=members.find(m=>m.id===c.member2);
    if(!m1||!m2)return"";
    return`<div class="conn-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div class="avatar ${avc(m1.gender)}" style="width:30px;height:30px;font-size:10px">${ini(m1.name)}</div>
        <span style="color:var(--text2)">⇄</span>
        <div class="avatar ${avc(m2.gender)}" style="width:30px;height:30px;font-size:10px">${ini(m2.name)}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:500">${m1.name} & ${m2.name}</div><div style="font-size:11px;color:var(--text2)">${c.reason||''}</div></div>
        <span class="${c.status==='done'?'badge-done':'badge-pending'}">${c.status==='done'?'Fait':'En attente'}</span>
      </div>
      ${c.status==='pending'?`<button class="btn btn-outline" style="padding:8px;font-size:12px" onclick="markD('${c.id}')">Marquer comme fait</button>`:''}
    </div>`;
  }).join("");
}

window.markD=async id=>{await updateDoc(doc(db,"connections",id),{status:"done"});toast("Validé ✓");};

window.switchTab=name=>{
  ["members","add","matching","connections"].forEach((t,i)=>{
    document.querySelectorAll(".nav-btn")[i].classList.toggle("active",t===name);
    document.getElementById("tab-"+t).classList.toggle("active",t===name);
  });
  if(name==="connections")renderC();
  if(name==="matching")updMS();
};
</script>
</body>
